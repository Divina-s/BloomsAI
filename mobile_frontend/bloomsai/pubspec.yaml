name: bloomsai
description: "A new Flutter project."
publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  google_generative_ai: ^0.3.2
  flutter_markdown: ^0.6.20
  path_provider: ^2.1.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sizer: ^2.0.15
  flutter_spinkit: ^5.2.0
  image_picker: ^1.0.4
  provider: ^6.0.5
  intl: ^0.18.0
  http: ^1.1.0
  dio: ^4.0.0
  json_annotation: ^4.8.0
  shared_preferences: ^2.2.2
  get: ^4.6.6
  flutter_svg: ^2.0.10+1
  iconly: ^1.0.1
  colorize_text_avatar: ^1.0.2
  pin_code_fields: ^8.0.1
  persistent_bottom_nav_bar_v2: ^4.2.8
  page_transition: ^2.1.0
  flutter_styled_toast: ^2.1.3
  uuid: ^4.4.0
  flutter_native_splash: ^2.3.11

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  json_serializable: ^6.6.0
  hive_generator: ^2.0.1
  

  
  flutter_lints: ^2.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/images/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware

  fonts:
      - family: BloomsAIMedium
        fonts:
          - asset: assets/fonts/BloomsAIMedium.ttf

      - family: BloomsAIBold
        fonts:
          - asset: assets/fonts/BloomsAIBold.ttf